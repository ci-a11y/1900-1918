<div id="menu" class="overlay"><div class="panel"><div class="menuGrid"><div><div class="stamp">WAR FILE / CONFIDENTIAL</div><h1 class="title">1914–1919<br>戰爭與和平任務</h1><p class="sub">穿越戰前歐洲、壕溝戰場、1917 轉捩點及巴黎和會，收集檔案、回答考點，完成凡爾賽旗杆挑戰。</p><p class="mini">操作：← → 移動｜Space / ↑ 跳躍｜短按小跳，長按高跳｜受傷會被彈後，向相反方向修正。</p><label class="mini">開始前輸入名稱；完成遊戲後將自動上載 Google Sheet 龍虎榜。</label><input id="playerName" class="input" maxlength="12" placeholder="輸入名稱，例如 3A Chan / 歷史情報員" value=""></div><div><div class="cards"><div class="card" onclick="startGame('easy')"><h3>簡易模式</h3><p>8題｜較多穩定度｜教學路線較安全</p><button class="btn">開始簡易任務</button></div><div class="card" onclick="startGame('hard')"><h3>困難模式</h3><p>12題｜較少穩定度｜敵人與陷阱較密</p><button class="btn">開始困難任務</button></div></div><div class="leader"><h4>龍虎榜 Top 5</h4><div id="leaderRows" class="mini">載入中...</div></div></div></div></div></div>

<script>
const LEADERBOARD_URL="https://script.google.com/macros/s/AKfycbznfJMNPGJqktjMsqBKZCiE5BAdZxafipeEflXFWBd9KxHRWAqyAgWH1yfXbk_W_GkN/exec";
const QUESTIONS=[{"t": "二十世紀初英國最重視維持哪方面的優勢？", "type": "fact", "cat": "一戰前因", "choices": ["陸軍霸權", "海上霸權", "東歐控制權", "巴爾幹領導權"], "ans": 1, "exp": "英國擁有世界第一海軍，不能容許德國挑戰海上霸權。", "diff": "easy"}, {"t": "法國在普法戰爭後最希望收回哪兩地？", "type": "fact", "cat": "一戰前因", "choices": ["阿爾薩斯和洛林", "波森和西普魯士", "薩爾和但澤", "阜姆和達爾馬西亞"], "ans": 0, "exp": "法國在1871年失去阿爾薩斯和洛林，復仇情緒成為重要背景。", "diff": "easy"}, {"t": "下列哪項最能概括「極端民族主義」？", "type": "concept", "cat": "一戰前因", "choices": ["主張各國公平合作", "只重視民族利益，甚至不惜用武力排斥他國利益", "反對所有殖民地擴張", "主張完全裁軍"], "ans": 1, "exp": "極端民族主義是一種狹隘而具破壞性的民族優越思想。", "diff": "easy"}, {"t": "「泛日耳曼主義」主要與哪個國家有關？", "type": "fact", "cat": "一戰前因", "choices": ["法國", "德國", "英國", "俄國"], "ans": 1, "exp": "德國推行泛日耳曼主義，希望擴大日耳曼民族勢力。", "diff": "easy"}, {"t": "「泛斯拉夫主義」主要與哪個國家支持巴爾幹斯拉夫民族有關？", "type": "fact", "cat": "一戰前因", "choices": ["俄國", "英國", "意大利", "德國"], "ans": 0, "exp": "俄國以斯拉夫民族保護者自居，支持塞爾維亞等斯拉夫民族。", "diff": "easy"}, {"t": "三國同盟包括德國、奧匈和哪一國？", "type": "fact", "cat": "同盟制度", "choices": ["英國", "法國", "意大利", "俄國"], "ans": 2, "exp": "1882年三國同盟由德國、奧匈和意大利組成。", "diff": "easy"}, {"t": "三國協約包括英國、法國和哪一國？", "type": "fact", "cat": "同盟制度", "choices": ["德國", "俄國", "奧匈", "意大利"], "ans": 1, "exp": "1907年英、法、俄形成三國協約。", "diff": "easy"}, {"t": "同盟制度為何容易令局部衝突擴大？", "type": "cause", "cat": "同盟制度", "choices": ["盟國有軍事支援義務，容易連鎖參戰", "各國會立即裁軍", "殖民地會自動獨立", "國聯會即時介入"], "ans": 0, "exp": "同盟義務令一國衝突可能牽動整個陣營。", "diff": "both"}, {"t": "英德海軍軍備競賽主要圍繞哪類戰艦？", "type": "fact", "cat": "軍備競賽", "choices": ["無畏艦", "潛水艇", "航空母艦", "鐵甲列車"], "ans": 0, "exp": "英德在無畏艦建造方面競爭激烈。", "diff": "easy"}, {"t": "軍備競賽如何加劇歐洲緊張？", "type": "cause", "cat": "軍備競賽", "choices": ["增加猜疑和恐懼", "令各國放棄殖民地", "令民族自決完全落實", "令國聯成立"], "ans": 0, "exp": "軍備增加使列強更恐懼對方，降低互信。", "diff": "both"}, {"t": "列強爭奪殖民地的主要原因不包括哪一項？", "type": "compare", "cat": "殖民地爭奪", "choices": ["原料", "市場", "安置過剩人口", "推動完全平等的民族自決"], "ans": 3, "exp": "殖民地爭奪主要關乎資源、市場和勢力，不是平等民族自決。", "diff": "hard"}, {"t": "第一次摩洛哥危機發生於哪一年？", "type": "fact", "cat": "國際危機", "choices": ["1905年", "1908年", "1912年", "1914年"], "ans": 0, "exp document.querySelectorAll('.touchBtn').forEach(b=>{let k=b.dataset.k;b.addEventListener('touchstart',e=>{e.preventDefault();mobileKeys[k]=true;if(k==='jump')player.buffer=.12});b.addEventListener('touchend',e=>{e.preventDefault();mobileKeys[k]=false})});
function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;if(game.state==='playing')update(dt);draw();if(game.state!=='menu')requestAnimationFrame(loop)}
function update(dt){game.time+=dt;if(game.time>game.timeLimit)endGame(false);if(game.toastT>0)game.toastT-=dt;if(game.flash>0)game.flash-=dt;if(game.shake>0)game.shake*=.86;if(player.inv>0)player.inv-=dt;if(player.stun>0)player.stun-=dt;let left=keys.ArrowLeft||keys.KeyA||mobileKeys.left,right=keys.ArrowRight||keys.KeyD||mobileKeys.right,jump=keys.Space||keys.ArrowUp||keys.KeyW||mobileKeys.jump;if(player.stun>0){left=right=false}let accel=player.on?2500:1500,max=230;if(left){player.vx-=accel*dt;player.face=-1}if(right){player.vx+=accel*dt;player.face=1}if(!left&&!right&&player.on)player.vx*=Math.pow(.0008,dt);player.vx=Math.max(-max,Math.min(max,player.vx));if(player.on)player.coyote=.1; else player.coyote-=dt;player.buffer-=dt;if(player.buffer>0&&player.coyote>0){player.vy=-470;player.on=false;player.coyote=0;player.buffer=0;player.jumpHold=.18}if(!jump&&player.vy<0)player.vy*=.55;if(jump&&player.jumpHold>0&&player.vy<0){player.vy-=720*dt;player.jumpHold-=dt}let grav=player.vy<0?1200:1700;player.vy+=grav*dt;let old={x:player.x,y:player.y,w:player.w,h:player.h};player.x+=player.vx*dt;player.y+=player.vy*dt;player.on=false;for(let p of plats){let pr={x:p.x,y:p.y,w:p.w,h:p.h};if(rect(player,pr)){if(old.y+old.h<=p.y+6&&player.vy>=0){player.y=p.y-player.h;player.vy=0;player.on=true;player.safeX=player.x;player.safeY=player.y}else if(old.x+old.w<=p.x){player.x=p.x-player.w;player.vx=0}else if(old.x>=p.x+p.w){player.x=p.x+p.w;player.vx=0}else if(old.y>=p.y+p.h){player.y=p.y+p.h;player.vy=10}}}
if(player.y>H+220){game.health--;player.x=player.safeX;player.y=player.safeY;player.vx=0;player.vy=0;game.toast='跌落坑洞，回到最近安全點';game.toastT=1.5;if(game.health<=0)endGame(false)}
player.x=Math.max(0,Math.min(world.w-player.w,player.x));game.camera=Math.max(0,Math.min(world.w-W,player.x-W*0.42));
for(let it of items){if(it.got)continue;it.phase+=dt;if(rect(player,{x:it.x,y:it.y,w:it.w,h:it.h})){if(it.t==='file'){it.got=true;game.files++;game.score+=100}else if(it.t==='med'){it.got=true;game.health=Math.min(game.mode==='hard'?3:5,game.health+1);game.score+=60}else if(it.t==='mask'){it.got=true;player.inv=2;game.score+=80;game.toast='防毒面具：短暫保護';game.toastT=1.5}else if(it.t==='dove'){it.got=true;game.score+=160}else if(it.t==='quiz'){it.got=true;openQuiz()}}}
for(let e of enemies){e.x+=e.vx*e.dir*dt;if(e.x<e.min||e.x>e.max){e.dir*=-1;e.x=Math.max(e.min,Math.min(e.max,e.x))}if(e.type==='shadow'&&Math.abs(player.x-e.x)<220)e.dir=player.x<e.x?-1:1;if(rect(player,e))damage(e,'enemy')}
for(let h of hazards){h.phase+=dt;if(h.t==='gas'){h.active=Math.sin(h.phase*1.2)>-.35}else if(h.t==='shell'){h.active=(h.phase%3.2)>2.25}else h.active=true;if(h.active&&rect(player,h))damage(h,h.t)}
// flag
let flagRect={x:flag.x-8,y:flag.y,w:34,h:flag.h};if(!flag.done&&rect(player,flagRect)){if(game.qIndex<game.total){game.toast=`尚欠 ${game.total-game.qIndex} 個考點，未能完成任務`;game.toastT=2;player.x=flag.x-80;player.vx=-220}else{let rel=(player.y-flag.y)/flag.h;let heightScore=Math.max(0,Math.min(1,1-rel));game.flagScore=Math.round(heightScore*500);game.score+=game.flagScore;flag.done=true;endGame(true)}}}
function endGame(win){game.state='report';document.getElementById('report').classList.remove('hidden');let title=win?'任務完成':'任務失敗';let rank=game.correct>=game.total*.85?'凡爾賽首席談判員':game.correct>=game.total*.65?'和平會議代表':game.correct>=game.total*.4?'戰地觀察員':'歷史新兵';document.getElementById('reportStatus').textContent=`${title}｜${rank}`;document.getElementById('reportStats').innerHTML=[['模式',game.mode==='hard'?'困難模式':'簡易模式'],['名稱',game.name],['分數',game.score],['答對題數',`${game.correct} / ${game.total}`],['收集檔案',game.files],['用時',Math.round(game.time)+' 秒'],['旗杆獎勵',game.flagScore]].map(x=>`<div class="stat"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');let rev=['一戰爆發需結合長遠原因與導火線分析。','凡爾賽條約可短期削弱德國，但亦激起復仇情緒。','國際聯盟有和平理想，但因美國缺席、缺乏軍事力量及執行力不足而受限制。'];document.getElementById('reportReview').innerHTML='<ul>'+rev.map(r=>'<li>'+r+'</li>').join('')+'</ul>';autoUpload(win,rank)}
function autoUpload(win,rank){let el=document.getElementById('uploadState');el.textContent='正在自動上載 Google Sheet 龍虎榜...';let data={name:game.name,mode:game.mode,score:game.score,correct:game.correct,total:game.total,time:Math.round(game.time),files:game.files};fetch(LEADERBOARD_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)}).then(()=>{el.textContent='已自動上載成績。';loadLeaderboard()}).catch(()=>{el.textContent='上載未能確認；如 Apps Script 權限正確，通常仍會寫入。'})}
function showMenu(){document.getElementById('report').classList.add('hidden');document.getElementById('menu').classList.remove('hidden');game.state='menu';loadLeaderboard()}
function loadLeaderboard(){fetch(LEADERBOARD_URL+'?top=10').then(r=>r.json()).then(rows=>{let el=document.getElementById('leaderRows');if(!rows.length){el.textContent='暫無紀錄';return}el.innerHTML='<div class="row"><b>#</b><b>名稱</b><b>分數</b><b>模式</b></div>'+rows.slice(0,5).map((r,i)=>`<div class="row"><span>${i+1}</span><span>${r.name}</span><span>${r.score}</span><span>${r.mode==='hard'?'困難':'簡易'}</span></div>`).join('')}).catch(()=>document.getElementById('leaderRows').textContent='龍虎榜暫時未能載入')}
function draw(){ctx.save();let shake=game.shake||0;ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);drawWorld();ctx.restore();if(game.flash>0){ctx.fillStyle=`rgba(170,0,0,${game.flash})`;ctx.fillRect(0,0,W,H)}}
function drawWorld(){ctx.clearRect(0,0,W,H);let cam=game.camera;drawBg(cam);ctx.save();ctx.translate(-cam,0);plats.forEach(drawPlatform);hazards.forEach(drawHazard);items.forEach(drawItem);enemies.forEach(drawEnemy);drawFlag();drawPlayer();ctx.restore();drawHUD();}
function drawBg(cam){let z=zones.find(z=>cam+W/2>=z.x&&cam+W/2<z.x+z.w)||zones[0];let grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#19170f');grad.addColorStop(.55,z.theme==='trench'?'#302717':z.theme==='paris'?'#2a2415':'#242013');grad.addColorStop(1,'#17110b');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(202,166,74,.15)';for(let x=-100;x<W+100;x+=120){ctx.beginPath();ctx.moveTo(x+((cam*.15)%120),HUD);ctx.lineTo(x-130+((cam*.15)%120),H);ctx.stroke()}for(let y=HUD+20;y<H;y+=62){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}// silhouettes
ctx.fillStyle='rgba(0,0,0,.26)';for(let i=0;i<9;i++){let x=(i*170-(cam*.25)%170);ctx.beginPath();ctx.ellipse(x,438,90,28,0,0,Math.PI*2);ctx.fill();ctx.fillRect(x+52,355,5,85);ctx.beginPath();ctx.moveTo(x+54,375);ctx.lineTo(x+20,398);ctx.moveTo(x+55,375);ctx.lineTo(x+88,398);ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=5;ctx.stroke()}ctx.fillStyle='rgba(255,230,140,.08)';ctx.font='900 88px Georgia';ctx.fillText(z.theme==='paris'?'PARIS':z.theme==='versailles'?'VERSAILLES':z.theme==='turning'?'1917':z.theme==='trench'?'TRENCHES':'1914',360,220);ctx.fillStyle='rgba(0,0,0,.42)';ctx.fillRect(30,112,330,86);ctx.fillStyle='#ffe892';ctx.font='900 28px sans-serif';ctx.fillText(z.n,55,150);ctx.font='18px sans-serif';ctx.fillText(z.s,55,184);if(z.theme==='trench'){drawTrenchScenery(cam)}if(z.theme==='paris'||z.theme==='versailles')drawTreatyScenery(cam,z.theme)}
function drawTrenchScenery(cam){ctx.strokeStyle='rgba(210,210,190,.35)';ctx.lineWidth=3;for(let i=0;i<4;i++){ctx.beginPath();for(let x=0;x<W+20;x+=44){let y=385+i*12+Math.sin((x+cam*.4)/45)*7; if(x===0)ctx.moveTo(x,y); else ctx.lineTo(x,y)}ctx.stroke()}ctx.fillStyle='rgba(80,49,20,.35)';for(let x=0;x<W;x+=80){ctx.beginPath();ctx.ellipse(x,438,45,13,0,0,Math.PI*2);ctx.fill()}}
function drawTreatyScenery(cam,theme){ctx.fillStyle='rgba(230,220,170,.22)';ctx.fillRect(650,300,155,120);ctx.fillStyle='rgba(120,40,35,.5)';ctx.fillRect(675,334,105,10);ctx.fillRect(675,369,105,10);ctx.fillStyle='rgba(255,230,140,.75)';ctx.font='900 17px serif';ctx.fillText(theme==='paris'?'PEACE TABLE':'TREATY',665,323)}
function drawHUD(){ctx.fillStyle='rgba(10,9,5,.82)';ctx.fillRect(8,8,W-16,72);ctx.strokeStyle='#9e8538';ctx.lineWidth=2;ctx.strokeRect(8,8,W-16,72);ctx.fillStyle='#ffe892';ctx.font='700 18px sans-serif';let z=zones.find(z=>player&&player.x>=z.x&&player.x<z.x+z.w)||zones[0];ctx.fillText(`${game.mode==='hard'?'困難':'簡易'}模式`,24,30);ctx.fillText(`穩定度 ${game.health}`,190,30);ctx.fillText(`分數 ${game.score}`,300,30);ctx.fillText(`檔案 ${game.files}`,420,30);ctx.fillText(`題目 ${game.qIndex}/${game.total}`,530,30);ctx.fillText(`時間 ${Math.max(0,Math.round(game.timeLimit-game.time))}s`,660,30);ctx.fillText(`區域：${z.n}`,24,62);ctx.font='15px sans-serif';ctx.fillText(`玩家：${game.name||'未命名'}｜受傷會彈後，向相反方向修正`,190,62);ctx.fillStyle='#a07c20';ctx.fillRect(20,72,W-60,8);ctx.fillStyle='#f2cf5a';ctx.fillRect(20,72,(W-60)*(player?player.x/world.w:0),8);if(game.toastT>0){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(300,92,420,34);ctx.fillStyle='#ffe892';ctx.font='900 17px sans-serif';ctx.fillText(game.toast,318,115)}}
function drawPlatform(p){ctx.fillStyle='#4a2f18';ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle='#8a5d2a';ctx.fillRect(p.x,p.y,p.w,18);ctx.strokeStyle='rgba(0,0,0,.25)';for(let x=p.x+10;x<p.x+p.w;x+=28){ctx.beginPath();ctx.moveTo(x,p.y+28);ctx.lineTo(x+14,p.y+40);ctx.stroke()}}
function drawPlayer(){if(!player)return;if(player.inv>0&&Math.floor(player.inv*16)%2===0)return;let x=player.x,y=player.y;ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(x+16,y+50,28,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#203b4d';ctx.fillRect(x+6,y+16,24,32);ctx.fillStyle='#dec08e';ctx.fillRect(x+8,y+3,20,14);ctx.fillStyle='#26313b';ctx.fillRect(x+5,y+0,26,6);ctx.fillStyle='#6a4a25';ctx.fillRect(x-2,y+28,10,16);ctx.fillStyle='#caa64a';ctx.fillRect(x+28,y+30,22,5);ctx.fillStyle='#ffe892';ctx.font='11px sans-serif';ctx.fillText('情報員',x-6,y-8)}
function drawEnemy(e){let x=e.x,y=e.y;ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(x+16,y+e.h,26,7,0,0,Math.PI*2);ctx.fill();if(e.type==='german'){ctx.fillStyle='#596164';ctx.fillRect(x+5,y+16,24,30);ctx.fillStyle='#2b3032';ctx.beginPath();ctx.arc(x+17,y+13,14,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(x+3,y+13,28,5);ctx.fillStyle='#161616';ctx.fillRect(x+10,y+25,16,4);ctx.fillStyle='#9a6b35';ctx.fillRect(x+27,y+30,24,4);ctx.fillStyle='#ffe892';ctx.font='10px sans-serif';ctx.fillText('德軍',x+4,y-6)}else if(e.type==='austro'){ctx.fillStyle='#8b2e2a';ctx.fillRect(x+6,y+14,23,32);ctx.fillStyle='#d5b57b';ctx.fillRect(x+9,y+2,18,14);ctx.fillStyle='#5a3e25';ctx.fillRect(x+6,y+0,24,6);ctx.fillStyle='#111';ctx.fillRect(x+11,y+25,14,4);ctx.fillStyle='#c6c6b8';ctx.fillRect(x+29,y+29,28,3);ctx.fillStyle='#ffe892';ctx.font='10px sans-serif';ctx.fillText('奧匈',x+4,y-6)}else{ctx.fillStyle='#111';ctx.fillRect(x+4,y+10,28,45);ctx.beginPath();ctx.arc(x+18,y+10,15,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='#d33';ctx.fillRect(x+10,y+24,18,3);ctx.fillStyle='#ffe892';ctx.font='10px sans-serif';ctx.fillText('危機',x+3,y-6)}}
function drawHazard(h){let x=h.x,y=h.y;if(h.t==='wire'){ctx.strokeStyle='#d8d8c8';ctx.lineWidth=2;for(let k=0;k<3;k++){ctx.beginPath();for(let i=0;i<h.w;i+=18){let yy=y+5+k*5+(i%36?4:-4);if(i===0)ctx.moveTo(x+i,yy);else ctx.lineTo(x+i,yy)}ctx.stroke()}for(let i=0;i<h.w;i+=22){ctx.beginPath();ctx.moveTo(x+i,y+h.h);ctx.lineTo(x+i+10,y);ctx.stroke()}}else if(h.t==='gas'){if(!h.active)return;let a=.18+.08*Math.sin(h.phase*3);for(let i=0;i<6;i++){ctx.fillStyle=`rgba(135,190,92,${a})`;ctx.beginPath();ctx.ellipse(x+20+i*32,y+h.h-20-Math.sin(h.phase+i)*12,42,28,0,0,Math.PI*2);ctx.fill()}}else if(h.t==='shell'){ctx.strokeStyle=h.active?'rgba(255,70,45,.95)':'rgba(255,70,45,.35)';ctx.setLineDash([8,8]);ctx.lineWidth=3;ctx.strokeRect(x,y,h.w,h.h);ctx.setLineDash([]);ctx.fillStyle=h.active?'#ff5a36':'#d95a46';ctx.font='900 15px sans-serif';ctx.fillText(h.active?'炮火！':'炮火警告',x+12,y+28);if(h.active){ctx.fillStyle='rgba(255,130,35,.3)';ctx.beginPath();ctx.arc(x+h.w/2,y+h.h-20,40,0,Math.PI*2);ctx.fill()}}}
function drawItem(it){if(it.got)return;let bob=Math.sin(it.phase*3)*4,x=it.x,y=it.y+bob;if(it.t==='file'){ctx.fillStyle='#e3cd7d';ctx.fillRect(x,y,it.w,it.h);ctx.fillStyle='#8b3344';ctx.fillRect(x+5,y+8,14,3);ctx.fillRect(x+5,y+16,14,3)}else if(it.t==='quiz'){ctx.fillStyle='#f2c84d';ctx.beginPath();ctx.arc(x+14,y+14,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#17130a';ctx.font='900 24px sans-serif';ctx.fillText('?',x+7,y+22);ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(x-16,y+30,62,22);ctx.fillStyle='#ffe892';ctx.font='13px sans-serif';ctx.fillText('考點',x-5,y+46)}else if(it.t==='med'){ctx.fillStyle='#eee';ctx.fillRect(x,y,28,28);ctx.fillStyle='#c33';ctx.fillRect(x+11,y+4,6,20);ctx.fillRect(x+4,y+11,20,6)}else if(it.t==='mask'){ctx.fillStyle='#9fc49a';ctx.beginPath();ctx.arc(x+14,y+14,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#263';ctx.fillRect(x+8,y+11,12,5)}else{ctx.fillStyle='#f2e9a0';ctx.beginPath();ctx.arc(x+14,y+14,15,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6d6';ctx.font='18px serif';ctx.fillText('✦',x+5,y+21)}}
function drawFlag(){let x=flag.x,y=flag.y;ctx.fillStyle='#c6b16b';ctx.fillRect(x,y,flag.w,flag.h);ctx.fillStyle='#7a1f1f';ctx.fillRect(x+flag.w,y+28,70,42);ctx.fillStyle='#ffe892';ctx.font='900 16px sans-serif';ctx.fillText('VERSAILLES',x-48,y-12);ctx.font='12px sans-serif';ctx.fillText('跳旗越高，獎勵越高',x-72,y+flag.h+18);for(let i=0;i<5;i++){ctx.strokeStyle=`rgba(255,232,146,${.25+i*.12})`;ctx.beginPath();ctx.moveTo(x-10,y+i*45);ctx.lineTo(x+flag.w+10,y+i*45);ctx.stroke()}}
loadLeaderboard();drawWorld();
</script></body></html>
