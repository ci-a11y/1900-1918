<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <title>1914–1919：戰爭與和平任務</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0b1020;
      overflow: hidden;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", "PingFang TC", sans-serif;
    }

    /* Canvas 全畫面（用 svh/dvh 防 iOS Safari 黑邊/跳動） */
    #game{
      display:block;
      width:100vw;
      height:100svh;      /* 新 Safari */
      height:100dvh;      /* 新規格 */
      background:#0b1020;
      touch-action:none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===============================
       手機虛擬控制器（圓形）
       =============================== */

    #touchUI{
      position:fixed;
      left:0;
      right:0;
      bottom: calc(14px + env(safe-area-inset-bottom));
      height: 170px;
      pointer-events:none;
      z-index:10;
      display:none; /* JS 判斷手機先顯示 */
    }

    /* 左邊：圓形方向盤 */
    #movePad{
      position:absolute;
      left: 18px;
      bottom: 0;
      width: 124px;
      height: 124px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events:auto;
      touch-action:none;
      backdrop-filter: blur(6px);
    }
    #movePad::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width: 38px;
      height: 38px;
      margin-left:-19px;
      margin-top:-19px;
      border-radius:50%;
      background: rgba(255,255,255,0.22);
    }

    /* 右邊：跳躍掣（隔遠啲唔撞手） */
    #btnJump{
      position:absolute;
      right: 24px;
      bottom: 10px;
      width: 98px;
      height: 98px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.16);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      pointer-events:auto;
      touch-action:none;
      backdrop-filter: blur(6px);
    }
    #btnJump:active{ background: rgba(255,255,255,0.28); }

    /* V9 原版改良：開始前輸入名稱 + 模式選擇 */
    #startOverlay{
      position:fixed;
      inset:0;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
      background:
        radial-gradient(circle at 22% 20%, rgba(180,80,40,.25), transparent 26%),
        radial-gradient(circle at 78% 70%, rgba(80,110,160,.22), transparent 30%),
        rgba(5,8,18,.88);
      color:#f4f0e3;
    }
    #startCard{
      width:min(980px, 96vw);
      max-height:92vh;
      overflow:auto;
      border:1px solid rgba(243,199,75,.45);
      background:rgba(10,14,26,.86);
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      padding:26px;
      box-sizing:border-box;
    }
    #startCard h1{margin:0 0 8px;font-size:34px;letter-spacing:.04em;color:#ffd166;}
    #startCard .sub{opacity:.88;margin-bottom:18px;line-height:1.55;}
    #startGrid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;}
    #startCard input{
      width:100%;
      box-sizing:border-box;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(243,199,75,.5);
      background:rgba(0,0,0,.35);
      color:#fff;
      font-size:18px;
      outline:none;
      margin:8px 0 14px;
    }
    #startCard button{
      border:1px solid rgba(243,199,75,.55);
      border-radius:12px;
      padding:14px 18px;
      margin:6px 8px 6px 0;
      color:#fff;
      background:rgba(160,105,30,.75);
      font-size:17px;
      font-weight:800;
      cursor:pointer;
    }
    #startCard button.secondary{background:rgba(255,255,255,.10);}
    #leaderboardBox{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      padding:14px;
      min-height:190px;
      line-height:1.55;
    }
    #leaderboardBox h3{margin:0 0 8px;color:#ffd166;}
    .smallNote{font-size:14px;opacity:.78;line-height:1.6;}
    .startError{
      min-height:22px;
      margin: 0 0 10px;
      color:#ff6b7a;
      font-weight:800;
      font-size:15px;
    }
    #playerNameInput.invalid{
      border-color:#ff6b7a !important;
      box-shadow:0 0 0 2px rgba(255,107,122,.25);
    }
    @media(max-width:760px){
      #startGrid{grid-template-columns:1fr;}
      #startCard h1{font-size:26px;}
      #startCard{padding:18px;}
    }

  </style>
</head>

<body>

  <div id="startOverlay">
    <div id="startCard">
      <h1>1914–1919：戰爭與和平任務</h1>
      <div class="sub">
        你是和平特派員，任務不是打贏戰爭，而是帶着歷史線索穿越一戰戰場。你要收集羊皮紙補給、破解「情報資訊」，理解1900–1914年的危機如何累積、戰爭如何擴大，以及1919年巴黎和會如何嘗試重建和平。最後請先觸碰旗杆取得高度分數，再通過凡爾賽大門完成任務。
      </div>
      <div id="startGrid">
        <div>
          <label for="playerNameInput"><b>玩家名稱</b></label>
          <input id="playerNameInput" maxlength="12" placeholder="例如：3A 陳同學 / Chan123" />
          <div id="nameError" class="startError"></div>
          <div>
            <button id="btnEasy">開始簡易模式</button>
            <button id="btnHard" class="secondary">開始困難模式</button>
          </div>
          <p class="smallNote">
            請先輸入玩家名稱，才可開始任務。簡易模式較寬鬆；困難模式有更多戰場障礙及情報資訊。兩個模式均以 3 個心心表示生命，完成或失敗後會自動上載成績。
          </p>
        </div>
        <div id="leaderboardBox">
          <h3>網上龍虎榜</h3>
          <div id="leaderboardContent">讀取中……</div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <!-- 手機虛擬控制器：圓形方向盤 + 跳躍 -->
  <div id="touchUI" aria-hidden="true">
    <div id="movePad" aria-label="移動"></div>
    <button id="btnJump" aria-label="跳躍">⤒</button>
  </div>

  <script>
  (() => {

    const LEADERBOARD_URL = "https://script.google.com/macros/s/AKfycbznfJMNPGJqktjMsqBKZCiE5BAdZxafipeEflXFWBd9KxHRWAqyAgWH1yfXbk_W_GkN/exec";

    function loadLeaderboard() {
      const box = document.getElementById("leaderboardContent");
      if (!box) return;
      box.textContent = "讀取中……";
      fetch(LEADERBOARD_URL + "?top=10")
        .then(r => r.json())
        .then(rows => {
          if (!Array.isArray(rows) || rows.length === 0) {
            box.innerHTML = "暫無紀錄。";
            return;
          }
          const easy = rows.filter(r => r.mode === "easy").slice(0, 5);
          const hard = rows.filter(r => r.mode === "hard").slice(0, 5);
          const render = (title, arr) => `<b>${title}</b><br>` + (arr.length ? arr.map((r,i)=>`${i+1}. ${String(r.name||"無名和平特派員")}｜${Number(r.score||0)}分｜${Number(r.correct||0)}/${Number(r.total||0)}`).join("<br>") : "未有紀錄");
          box.innerHTML = render("簡易 Top 5", easy) + "<br><br>" + render("困難 Top 5", hard);
        })
        .catch(() => {
          box.innerHTML = "未能讀取網上榜；完成遊戲後仍會嘗試自動上載。";
        });
    }

    const cleanName = (name) => {
      // 支援中文、英文、數字及空格；只移除 HTML/JS 危險符號及過長字串。
      let s = String(name || "")
        .trim()
        .replace(/[<>"'`]/g, "")
        .replace(/\s+/g, " ")
        .slice(0, 12);
      const bad = ["仆街","屌","on9","傻閪","撚","柒","fuck","shit","bitch"];
      bad.forEach(w => s = s.replace(new RegExp(w, "gi"), "*"));
      // 舊版用 \W 會把純中文名字誤判為「無效」；改用 Unicode Letter/Number 判斷。
      if (!s || !/[\p{L}\p{N}]/u.test(s)) s = "無名和平特派員";
      return s;
    };

        const sy = this.y | 0;

        if (this.type === "ground") {
          const tileW = SPRITES.brick[0].length * scale;
          const tileH = SPRITES.brick.length * scale;
          for (let yy = sy; yy < sy + this.h; yy += tileH) {
            for (let xx = sx; xx < sx + this.w; xx += tileW) drawSprite(ctx, SPRITES.brick, xx, yy, scale);
          }
        } else {
          const sprW = SPRITES.beam[0].length * scale;
          for (let xx = sx; xx < sx + this.w; xx += sprW) drawSprite(ctx, SPRITES.beam, xx, sy, scale);
          ctx.fillStyle = "rgba(0,0,0,0.18)";
          ctx.fillRect(sx, sy + SPRITES.beam.length * scale, this.w, 3);
        }
      }
    }

        this.x += this.vx * dt;

      draw(ctx, camX, scale) {

    class Bomber {
      constructor(x, y, minX, maxX, speed = 70) {
        this.x = x; this.y = y;
        this.minX = minX; this.maxX = maxX;
        this.vx = speed;
        this.w = 92; this.h = 30;

      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt, game) {
        this.x += this.vx * dt;
        if (this.x < this.minX) { this.x = this.minX; this.vx = Math.abs(this.vx); }
        if (this.x + this.w > this.maxX) { this.x = this.maxX - this.w; this.vx = -Math.abs(this.vx); }

        const onScreen = (this.x - game.cameraX) > -160 && (this.x - game.cameraX) < game.W + 160;
        this.alertCooldown = Math.max(0, this.alertCooldown - dt);
        if (onScreen && game.player.x > 520 && this.alertCooldown <= 0) {
          game.bomberWarningTimer = Math.max(game.bomberWarningTimer || 0, 1.6);
          this.alertCooldown = 4.8;

        this.dropTimer -= dt;
        if (onScreen && this.dropTimer <= 0.45) {
          game.bombFlashTimer = Math.max(game.bombFlashTimer || 0, 0.18);

          this.dropTimer = game.mode === "hard" ? 1.45 + Math.random() * 1.2 : 2.35 + Math.random() * 1.8;

        ctx.fillStyle = "#7a3b2e";
        ctx.fillRect(0, 15, 16, 6);            // 機鼻
        ctx.fillStyle = "#8d4b35";
        ctx.fillRect(76, 9, 16, 17);           // 尾部

        ctx.fillRect(83, 3, 9, 10);            // 垂直尾翼

        ctx.fillStyle = "#cfd8e6";

        ctx.fillRect(42, 26, 18, 5);           // 投彈艙

        ctx.fillStyle = "#f3c74b";
        ctx.fillRect(72, 5, 6, 6);

          ctx.fillRect(39, 28, 24, 5);
          ctx.fillRect(47, 34, 8, 8);
        }
        ctx.restore();

        // 只有接近投彈/危險時顯示名稱，避免似背景常駐標籤
        if (this.dropTimer <= 1.0) {
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.70)";

    class BarbedWire {
      constructor(x, y, w = 72, h = 28) {
        this.x = x; this.y = y; this.w = w; this.h = h;
      }
      get aabb() { return new AABB(this.x + 4, this.y + 2, this.w - 8, this.h - 2); }
      draw(ctx, camX) {
        const sx = (this.x - camX) | 0;
        const sy = this.y | 0;
        ctx.save();
        // 泥地／壕溝底色
        ctx.fillStyle = "rgba(73,54,42,0.70)";
        ctx.fillRect(sx - 4, sy + this.h - 7, this.w + 8, 9);

        // 木樁
        ctx.strokeStyle = "#8a6b4a";
        ctx.lineWidth = 4;
        for (let x = sx + 6; x < sx + this.w; x += 18) {
          ctx.beginPath();
          ctx.moveTo(x, sy + this.h + 2);
          ctx.lineTo(x + 7, sy + 1);
          ctx.stroke();
        }

        // 主鐵線
        ctx.strokeStyle = "#cbd1dc";
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
          const yy = sy + 6 + i * 8;
          ctx.beginPath();
          ctx.moveTo(sx, yy);
          ctx.lineTo(sx + this.w, yy);
          ctx.stroke();
        }

        // 交叉鐵線
        ctx.strokeStyle = "#e1e6ee";
        ctx.lineWidth = 1.4;
        for (let x = sx + 2; x < sx + this.w; x += 12) {
          ctx.beginPath();
          ctx.moveTo(x, sy + 4);
          ctx.lineTo(x + 10, sy + 20);
          ctx.moveTo(x + 10, sy + 4);
          ctx.lineTo(x, sy + 20);
          ctx.stroke();
        }

        // 倒刺
        ctx.strokeStyle = "#f0f3f8";
        ctx.lineWidth = 1.1;
        for (let x = sx + 6; x < sx + this.w; x += 10) {
          for (const yy of [sy + 6, sy + 14, sy + 22]) {
            ctx.beginPath();
            ctx.moveTo(x - 3, yy - 3);
            ctx.lineTo(x + 3, yy + 3);
            ctx.moveTo(x + 3, yy - 3);
            ctx.lineTo(x - 3, yy + 3);
            ctx.stroke();
          }
        }
        ctx.restore();
      }
    }

    class Enemy {
      constructor(x, y, patrolMin, patrolMax) {
        this.x = x; this.y = y;
        this.w = 22; this.h = 30;
        this.vx = 35; this.vy = 0;
        this.patrolMin = patrolMin; this.patrolMax = patrolMax;
        this.alive = true;
        this.anim = 0;
        this.face = 1;
        this.standOnBeams = true;
      }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt, game) {
        if (!this.alive) return;
        this.anim += dt * 8;

        this.x += this.vx * dt;
        this.face = this.vx >= 0 ? 1 : -1;
        if (this.x < this.patrolMin) { this.x = this.patrolMin; this.vx = Math.abs(this.vx); }
        if (this.x + this.w > this.patrolMax) { this.x = this.patrolMax - this.w; this.vx = -Math.abs(this.vx); }

        this.vy += game.physics.gravity * dt;
        this.y += this.vy * dt;

        for (const p of game.platforms) {
          if (!this.standOnBeams && p.type === "beam") continue;
          const a = this.aabb, b = p.aabb;
          if (!a.intersects(b)) continue;
          const wasAbove = (a.y + a.h) - b.y < 14 && this.vy >= 0;
          if (wasAbove) { this.y = b.y - this.h; this.vy = 0; }
        }
      }
      draw(ctx, camX, scale) {
        if (!this.alive) return;
        const frame = (Math.floor(this.anim) % 2 === 0) ? SPRITES.enemy1 : SPRITES.enemy2;
        drawSprite(ctx, frame, (this.x - camX) | 0, this.y | 0, scale, this.face < 0);
      }
    }

    class ShooterEnemy extends Enemy {
      constructor(x, y, patrolMin, patrolMax, opts = {}) {
        super(x, y, patrolMin, patrolMax);
        this.patrol = !!opts.patrol;
        this.vx = this.patrol ? (opts.vx ?? 22) : 0;
        this.cooldown = 0.9 + Math.random() * 0.6;
        this.minCD = 1.15;
        this.maxCD = 2.05;
        this.range = opts.range ?? 480;
        this.bulletSpeed = opts.bulletSpeed ?? 380;
      }
      update(dt, game) {
        if (!this.alive) return;

        if (this.patrol) super.update(dt, game);
        else {
          this.anim += dt * 6;
          this.vy += game.physics.gravity * dt;
          this.y += this.vy * dt;
          for (const p of game.platforms) {
            const a = this.aabb, b = p.aabb;
            if (!a.intersects(b)) continue;
            const wasAbove = (a.y + a.h) - b.y < 14 && this.vy >= 0;
            if (wasAbove) { this.y = b.y - this.h; this.vy = 0; }
          }
        }

        const px = game.player.x + game.player.w * 0.5;
        const ex = this.x + this.w * 0.5;
        const dx = px - ex;
        this.face = dx >= 0 ? 1 : -1;

        const onScreen = (this.x - game.cameraX) > -220 && (this.x - game.cameraX) < game.W + 220;
        const near = Math.abs(dx) <= this.range && Math.abs((game.player.y - this.y)) < 180;

        this.cooldown -= dt;
        if (onScreen && near && this.cooldown <= 0) {
          this.cooldown = this.minCD + Math.random() * (this.maxCD - this.minCD);
          const bx = this.face > 0 ? (this.x + this.w + 2) : (this.x - 12);
          const by = this.y + 14;

          // 0° / -30° / -45°（斜射）
          const angles = [0, -30, -45];
          const deg = angles[(Math.random() * angles.length) | 0];
          const rad = deg * Math.PI / 180;
          const spd = this.bulletSpeed;
          const vx = Math.cos(rad) * spd * this.face;
          const vy = Math.sin(rad) * spd;

          game.bullets.push(new Bullet(bx, by, vx, vy));
        }
      }
      draw(ctx, camX, scale) {
        if (!this.alive) return;
        const frame = (Math.floor(this.anim) % 2 === 0) ? SPRITES.shooter1 : SPRITES.shooter2;
        drawSprite(ctx, frame, (this.x - camX) | 0, this.y | 0, scale, this.face < 0);
      }
    }

    class Player {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.w = 22; this.h = 30;
        this.vx = 0; this.vy = 0;
        this.onGround = false;
        this.face = 1;
        this.anim = 0;
        this.invuln = 0;
        this.coyote = 0;
        this.jumpBuf = 0;
        this.jumpHold = 0;
        this.jumping = false;
        this.coyoteMax = 0.10;
        this.jumpBufMax = 0.12;
        this.jumpHoldMax = 0.18;
        this.jumpCut = 0.55;
      }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt, game) {
        const input = game.input;
        const inverted = game.effects.invertTimer > 0;
        const LEFT = inverted ? input.right : input.left;
        const RIGHT = inverted ? input.left : input.right;

        this.invuln = Math.max(0, this.invuln - dt);
        this.coyote = Math.max(0, this.coyote - dt);
        this.jumpBuf = Math.max(0, this.jumpBuf - dt);
        if (input.jumpPressed) this.jumpBuf = this.jumpBufMax;

        const accel = game.physics.accel;
        if (LEFT)  { this.vx -= accel * dt; this.face = -1; }
        if (RIGHT) { this.vx += accel * dt; this.face =  1; }
        if (!LEFT && !RIGHT) {
          const f = this.onGround ? game.physics.frictionGround : game.physics.frictionAir;
          this.vx *= Math.pow(f, dt * 60);
        }
        this.vx = clamp(this.vx, -game.physics.maxSpeed, game.physics.maxSpeed);

        const prevX = this.x;
        const prevY = this.y;

        const canJump = this.onGround || this.coyote > 0;
        if (this.jumpBuf > 0 && canJump) {
          this.vy = -game.physics.jumpVel;
          this.onGround = false;
          this.coyote = 0;
          this.jumpBuf = 0;
          this.jumping = true;
          this.jumpHold = 0;
        }

        this.vy += game.physics.gravity * dt;
        if (this.jumping && input.jump && this.vy < 0 && this.jumpHold < this.jumpHoldMax) {
          this.vy -= game.physics.gravity * dt * 0.55;
          this.jumpHold += dt;
        }
        if (this.jumping && !input.jump && this.vy < 0) {
          this.vy *= this.jumpCut;
          this.jumping = false;
        }

        this.x += this.vx * dt;
        this.resolveCollisionsX(game, prevX);
        this.y += this.vy * dt;
        this.onGround = false;
        this.resolveCollisionsY(game, prevY);
        if (this.onGround) { this.coyote = this.coyoteMax; this.jumping = false; }

        const moving = Math.abs(this.vx) > 20;
        this.anim += dt * (moving ? 10 : 4);

        if (this.y > game.H + 240) game.playerDie("你跌落坑洞，任務中斷。");
      }
      resolveCollisionsX(game, prevX) {
        for (const p of game.platforms) {
          if (p.type === "beam") continue;
          const a = this.aabb, b = p.aabb;
          if (!a.intersects(b)) continue;
          if (prevX + this.w <= b.x) this.x = b.x - this.w;
          else if (prevX >= b.x + b.w) this.x = b.x + b.w;
          this.vx = 0;
        }
        this.x = clamp(this.x, 0, game.levelWidth - this.w);
      }
      resolveCollisionsY(game, prevY) {
        for (const p of game.platforms) {
          const a = this.aabb, b = p.aabb;
          if (!a.intersects(b)) continue;
          const wasAbove = (prevY + this.h) <= b.y + 4;
          const wasBelow = prevY >= (b.y + b.h - 4);
          if (this.vy >= 0 && wasAbove) {
            this.y = b.y - this.h; this.vy = 0; this.onGround = true;
          } else if (this.vy < 0 && wasBelow) {
            this.y = b.y + b.h; this.vy = 0;
          } else {
            const overlapTop = (a.y + a.h) - b.y;
            const overlapBottom = (b.y + b.h) - a.y;
            if (overlapTop < overlapBottom) { this.y -= overlapTop; this.vy = 0; this.onGround = true; }
            else { this.y += overlapBottom; this.vy = 0; }
          }
        }
      }
      hurt(game, fromDir) {
        if (this.invuln > 0) return;
        game.lives -= 1;
        this.invuln = 1.0;
        this.vy = -220;
        this.vx = (fromDir || -this.face) * 220;
        if (game.lives <= 0) game.setState("gameover", "你失去所有生命，任務失敗。");
      }
      draw(ctx, camX, scale, invertBlink) {
        const moving = Math.abs(this.vx) > 20;
        const sprite = moving
          ? ((Math.floor(this.anim) % 2 === 0) ? SPRITES.playerWalk1 : SPRITES.playerWalk2)
          : SPRITES.playerIdle;

        const invFlicker = (this.invuln > 0 && Math.floor(this.invuln * 12) % 2 === 0);
        const invertFlicker = invertBlink && (Math.floor(performance.now() / 1000 * 12) % 2 === 0);
        if (invFlicker || invertFlicker) ctx.globalAlpha = 0.35;

        drawSprite(ctx, sprite, (this.x - camX) | 0, this.y | 0, scale, this.face < 0);
        ctx.globalAlpha = 1;
      }
    }

    class Game {
      constructor(canvas) {

      setupResize() {
        const apply = () => {
          const dpr = Math.min(2, window.devicePixelRatio || 1);
          this.canvas.width  = Math.floor(this.W * dpr);
          this.canvas.height = Math.floor(this.H * dpr);
          this.ctx.setTransform(1, 0, 0, 1, 0, 0);
          this.ctx.scale(dpr, dpr);
          this.ctx.imageSmoothingEnabled = false;
          this.canvas.style.width = "100vw";
          this.canvas.style.height = "100dvh";
        };
        apply();
        window.addEventListener("resize", apply, { passive: true });
        window.addEventListener("orientationchange", () => setTimeout(apply, 80), { passive: true });
        document.addEventListener("visibilitychange", () => { if (!document.hidden) apply(); }, { passive: true });
      }

      setupTouchControls() {
        const isMobile =
          matchMedia("(pointer: coarse)").matches ||
          /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        const touchUI = document.getElementById("touchUI");
        if (!touchUI) return;
        touchUI.style.display = isMobile ? "block" : "none";
        if (!isMobile) return;

        const pad = document.getElementById("movePad");
        const btnJump = document.getElementById("btnJump");

        let padActive = false;
        let centerX = 0;

        const updateCenter = () => {
          if (!pad) return;
          const r = pad.getBoundingClientRect();
          centerX = r.left + r.width / 2;
        };

        if (pad) {
          updateCenter();
          window.addEventListener("resize", updateCenter, { passive: true });
          window.addEventListener("orientationchange", () => setTimeout(updateCenter, 80), { passive: true });

          pad.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            if (this.state !== "playing") return;
            padActive = true;
            pad.setPointerCapture(e.pointerId);
          }, { passive: false });

          pad.addEventListener("pointermove", (e) => {
            if (!padActive || this.state !== "playing") return;
            const dx = e.clientX - centerX;
            const dead = 12;

            if (dx < -dead) { this.input.left = true;  this.input.right = false; }
            else if (dx > dead) { this.input.right = true; this.input.left = false; }
            else { this.input.left = false; this.input.right = false; }
          });

          const release = (e) => {
            padActive = false;
            this.input.left = false;
            this.input.right = false;
            try { pad.releasePointerCapture(e.pointerId); } catch {}
          };

          pad.addEventListener("pointerup", release);
          pad.addEventListener("pointercancel", release);
          pad.addEventListener("pointerleave", release);
        }

        if (btnJump) {
          btnJump.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            if (this.state !== "playing") return;
            if (!this.input.jump) this.input.jumpPressed = true;
            this.input.jump = true;
          }, { passive: false });

          const up = (e) => { e.preventDefault(); this.input.jump = false; };
          btnJump.addEventListener("pointerup", up, { passive: false });
          btnJump.addEventListener("pointercancel", up, { passive: false });
        }
      }

      clearInput() { this.input.left = this.input.right = this.input.jump = this.input.jumpPressed = false; }


      startGame(mode = "easy", name = "") {

      submitScore(finalState) {
        if (this.submitted) return;

        this.finalStatus = "正在自動上載成績……";
        const payload = {
          name: this.playerName,
          mode: this.mode,
          score: Math.floor(this.score),
          correct: this.correctCount || 0,
          total: this.totalQuizCount || 0,
          time: Math.max(0, Math.ceil(this.timeLimit - this.timeLeft)),
          files: this.items.filter(i => i.collected).length,
          result: finalState
        };
        fetch(LEADERBOARD_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)

          this.finalStatus = "成績已自動上載。";

      generateBuildings(n) {
        const arr = [];
        let x = 0;
        for (let i = 0; i < n; i++) {
          const w = 40 + Math.floor(Math.random() * 70);
          const h = 60 + Math.floor(Math.random() * 160);
          const style = Math.random();
          const roof = style < 0.55 ? "gable" : (style < 0.8 ? "flat" : "saw");
          const windows = 2 + Math.floor(Math.random() * 4);
          const chimney = Math.random() < 0.35;
          arr.push({ x, w, h, roof, windows, chimney, tone: Math.random() });
          x += w + (10 + Math.floor(Math.random() * 20));
        }
        return arr;
      }

      generateClouds(n) {
        const arr = [];
        for (let i = 0; i < n; i++) {
          arr.push({ x: Math.random() * this.levelWidth, y: 40 + Math.random() * 120, s: 2 + Math.floor(Math.random() * 2), spd: 4 + Math.random() * 8 });
        }
        return arr;
      }

      spawnBlast(x, y) {
        this.blasts.push({ x, y, life: 0.38, max: 0.38 });
      }

      shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      nextQuizIndex(source) {
        let bag = this.quizBags.get(source);
        if (!bag || bag.length === 0) {
          bag = this.shuffleArray([...Array(source.length).keys()]);
          this.quizBags.set(source, bag);
        }
        return bag.pop();
      }

      prepareQuizItem(raw) {
        const options = raw.options.map((text, originalIndex) => ({ text, originalIndex }));
        this.shuffleArray(options);
        return {
          q: raw.q,
          options: options.map(o => o.text),
          answer: options.findIndex(o => o.originalIndex === raw.answer),
          explain: raw.explain
        };
      }

      beginQuiz({ title, source, idx, onCorrect, onWrong }) {
        this.state = "quiz";
        const realIdx = Number.isInteger(idx) ? idx : this.nextQuizIndex(source);
        this.quiz.title = title;
        this.quiz.source = source;
        this.quiz.idx = realIdx;
        this.quiz.item = this.prepareQuizItem(source[realIdx]);
        this.quiz.selected = -1;
        this.quiz.feedback = "";
        this.quiz.optionRects = [];
        this.quiz.lock = 0;
        this.quiz.onCorrect = onCorrect;
        this.quiz.onWrong = onWrong;
        this.player.vx = 0; this.player.vy = 0;
        this.clearInput();
      }

      answerQuiz(choice) {
        if (this.quiz.lock > 0) return;
        this.quiz.selected = choice;
        const item = this.quiz.item;
        const correct = choice === item.answer;
        this.quiz.lock = 2.0;
        this.quiz.feedback = correct ? `✅ 答啱！${item.explain}` : `❌ 答錯！${item.explain}`;
        this.totalQuizCount = (this.totalQuizCount || 0) + 1;
        if (correct) this.correctCount = (this.correctCount || 0) + 1;
        if (correct && typeof this.quiz.onCorrect === "function") this.quiz.onCorrect();
        if (!correct && typeof this.quiz.onWrong === "function") this.quiz.onWrong();
      }

      bindQuizPointer() {
        this.canvas.addEventListener("pointerdown", (e) => {
          if (this.state !== "quiz") return;
          const r = this.canvas.getBoundingClientRect();
          const mx = (e.clientX - r.left) * (this.W / r.width);
          const my = (e.clientY - r.top) * (this.H / r.height);
          for (const b of this.quiz.optionRects) {
            if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
              this.answerQuiz(b.idx); break;
            }
          }
        }, { passive: true });
      }

      bindKeyboard() {
        window.addEventListener("keydown", (e) => {
          const target = e.target;
          const isTyping = target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.isContentEditable);
          if (isTyping) return;
          const blocks = ["ArrowLeft","ArrowRight","ArrowUp","Space","Enter","Digit1","Digit2","Digit3","Digit4"];
          if (blocks.includes(e.code)) e.preventDefault();

          if (this.state === "quiz") {
            if (e.code === "Digit1") this.answerQuiz(0);
            if (e.code === "Digit2") this.answerQuiz(1);
            if (e.code === "Digit3") this.answerQuiz(2);
            if (e.code === "Digit4") this.answerQuiz(3);
            return;
          }
          if ((this.state === "intro" || this.state === "rules") && (e.code === "Space" || e.code === "Enter")) {
            this.state = this.state === "intro" ? "rules" : "playing"; this.clearInput(); return;
          }
          if ((this.state === "win" || this.state === "gameover") && (e.code === "Space" || e.code === "Enter")) {
            this.resetAll(); return;
          }
          if (this.state !== "playing") return;
          if (e.code === "ArrowLeft") this.input.left = true;
          if (e.code === "ArrowRight") this.input.right = true;
          if (e.code === "Space" || e.code === "ArrowUp") {
            if (!this.input.jump) this.input.jumpPressed = true;
            this.input.jump = true;
          }
        }, { passive: false });

        window.addEventListener("keyup", (e) => {
          const target = e.target;
          const isTyping = target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.isContentEditable);
          if (isTyping) return;
          if (this.state !== "playing") return;
          if (e.code === "ArrowLeft") this.input.left = false;
          if (e.code === "ArrowRight") this.input.right = false;
          if (e.code === "Space" || e.code === "ArrowUp") this.input.jump = false;
        });
      }

      bindPointerStart() {
        this.canvas.addEventListener("pointerdown", () => {
          if (this.state === "quiz") return;
          if (this.state === "intro") { this.state = "rules"; this.clearInput(); return; }
          if (this.state === "rules") { this.state = "playing"; this.clearInput(); return; }
          if (this.state === "win" || this.state === "gameover") { this.resetAll(); return; }
        }, { passive: true });
      }

      loop() {
        const now = performance.now() / 1000;
        const frameDt = Math.min(0.05, now - this.last);
        this.last = now;
        this.accum += frameDt;
        while (this.accum >= this.fixedDt) { this.step(this.fixedDt); this.accum -= this.fixedDt; }
        this.render();
        requestAnimationFrame(() => this.loop());
      }

      step(dt) {
        for (const c of this.bgClouds) {
          c.x += c.spd * dt;
          if (c.x > this.levelWidth + 200) c.x = -200;
        }

        if (this.state === "quiz") { this.quiz.lock = Math.max(0, this.quiz.lock - dt); this.input.jumpPressed = false; return; }
        if (this.state !== "playing") { this.input.jumpPressed = false; return; }

        this.effects.invertTimer = Math.max(0, this.effects.invertTimer - dt);
        this.bomberWarningTimer = Math.max(0, (this.bomberWarningTimer || 0) - dt);
        this.bombFlashTimer = Math.max(0, (this.bombFlashTimer || 0) - dt);
        this.flagBonusTimer = Math.max(0, (this.flagBonusTimer || 0) - dt);
        if (this.flagCaptured) {
          this.flagSlideY += (this.flagTargetY - this.flagSlideY) * Math.min(1, dt * 6);
        }
        this.timeLeft -= dt;
        if (this.timeLeft <= 0) { this.timeLeft = 0; this.setState("gameover", T.timeUp); this.clearInput(); return; }

        this.player.update(dt, this);

        for (let i = this.bullets.length - 1; i >= 0; i--) {
          const b = this.bullets[i];
          b.update(dt, this);
          if (!b.dead && this.player.invuln <= 0 && this.player.aabb.intersects(b.aabb)) {
            b.dead = true;
            const fromDir = b.vx > 0 ? 1 : -1;
            this.player.hurt(this, fromDir);
          }
          if (b.dead) this.bullets.splice(i, 1);
        }

        for (const bm of this.bombers) bm.update(dt, this);
        for (let i = this.bombs.length - 1; i >= 0; i--) {
          const b = this.bombs[i];
          b.update(dt, this);
          if (!b.dead && this.player.invuln <= 0 && this.player.aabb.intersects(b.aabb)) {
            b.dead = true;
            this.spawnBlast(b.x, b.y);
            const fromDir = (this.player.x + this.player.w / 2) < b.x ? -1 : 1;
            this.player.hurt(this, fromDir);
          }
          if (b.dead) this.bombs.splice(i, 1);
        }
        for (let i = this.blasts.length - 1; i >= 0; i--) {
          this.blasts[i].life -= dt;
          if (this.blasts[i].life <= 0) this.blasts.splice(i, 1);
        }

        for (const wire of this.wires) {
          if (this.player.invuln <= 0 && this.player.aabb.intersects(wire.aabb)) {
            const fromDir = (this.player.x + this.player.w / 2) < (wire.x + wire.w / 2) ? -1 : 1;
            this.player.hurt(this, fromDir);
          }
        }

        for (const it of this.items) {
          it.update(dt);
          if (!it.collected && this.player.aabb.intersects(it.aabb)) {
            it.collected = true;
            if (this.lives < this.maxLives) {
              this.lives += 1;
              this.score += 80;
            } else {
              this.score += 120;
              this.timeLeft = Math.min(this.timeLimit, this.timeLeft + 1.0);
            }
          }
        }

        for (const st of this.stars) {
          st.update(dt);
          if (!st.used && this.player.aabb.intersects(st.aabb)) {
            st.used = true;
            this.beginQuiz({
              title: T.quizStarTitle, source: QUIZ_STARS,
              onCorrect: () => { this.score += 200; setTimeout(() => { this.clearInput(); this.state = "playing"; }, 2000); },
              onWrong:   () => { setTimeout(() => { this.clearInput(); this.state = "playing"; this.effects.invertTimer = 4; }, 2000); }
            });
            return;
          }
        }

        for (const en of this.enemies) {
          en.update(dt, this);
          if (!en.alive) continue;
          if (this.player.aabb.intersects(en.aabb)) {
            const playerBottom = this.player.y + this.player.h;
            const enemyTop = en.y;
            const falling = this.player.vy > 50;
            const stomp = falling && (playerBottom - enemyTop) < 14 && (this.player.y < en.y);
            if (stomp) {
              en.alive = false;
              this.player.vy = -260;
              this.beginQuiz({
                title: T.quizWWITitle, source: QUIZ_WWI,
                onCorrect: () => { this.score += 150; setTimeout(() => { this.clearInput(); this.state = "playing"; }, 2000); },
                onWrong:   () => {
                  this.lives -= 1;
                  if (this.lives <= 0) setTimeout(() => { this.setState("gameover", "你答錯第一次世界大戰題目，任務失敗。"); }, 2000);
                  else setTimeout(() => { this.clearInput(); this.state = "playing"; }, 2000);
                }
              });
              return;
            } else {
              const fromDir = (this.player.x + this.player.w * 0.5) < (en.x + en.w * 0.5) ? -1 : 1;
              this.player.hurt(this, fromDir);
            }
          }
        }

        if (!this.flagCaptured && this.player.aabb.intersects(this.flagAABB())) {
          this.flagCaptured = true;
          const hitY = this.player.y + this.player.h * 0.5;
          const top = this.flag.y;
          const bottom = this.flag.y + this.flag.h;
          const heightRatio = clamp((bottom - hitY) / this.flag.h, 0, 1);
          const heightBonus = Math.round(200 + heightRatio * 800);
          const timeBonus = Math.max(0, Math.ceil(this.timeLeft)) * 2;
          const bonus = heightBonus + timeBonus;
          this.score += bonus;
          this.flagTargetY = this.flag.y + this.flag.h - 50;
          this.flagBonusText = `旗杆高度獎勵 +${bonus}`;
          this.flagBonusTimer = 2.4;
        }

        if (this.player.aabb.intersects(this.goalAABB())) {
          this.beginQuiz({
            title: T.quizDoorTitle, source: QUIZ_FINAL,
            onCorrect: () => { this.score += 300; setTimeout(() => { this.clearInput(); this.setState("win"); }, 2000); },
            onWrong:   () => {
              this.lives -= 1;
              if (this.lives <= 0) setTimeout(() => { this.setState("gameover", "你答錯史料題，任務失敗。"); }, 2000);
              else setTimeout(() => {
                this.clearInput();
                this.state = "playing";
                this.player.x = this.goal.x - 220;
                this.player.y = this.goal.y - 40;
                this.player.vx = 0; this.player.vy = 0;
              }, 2000);
            }
          });
          return;
        }

        const target = clamp(this.player.x - this.W * 0.40, 0, this.levelWidth - this.W);
        this.cameraX = lerp(this.cameraX, target, this.cameraSmooth);
        this.score += Math.max(0, this.player.vx) * dt * 0.02;
        this.input.jumpPressed = false;
      }

      render() {
        const ctx = this.ctx, w = this.W, h = this.H;

        ctx.fillStyle = "#0b1020"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "rgba(185,199,230,0.10)"; ctx.fillRect(0, 0, w, h * 0.55);
        ctx.fillStyle = "rgba(185,199,230,0.06)"; ctx.fillRect(0, h * 0.35, w, h * 0.35);

        this.drawBackground(ctx);
        this.drawClouds(ctx);

        for (const p of this.platforms) {
          if (p.x - this.cameraX > w + 240 || p.x + p.w - this.cameraX < -240) continue;
          p.draw(ctx, this.cameraX, this.scale);
        }

        this.drawGoal(ctx);

        for (const wire of this.wires) {
          if (wire.x - this.cameraX > w + 220 || wire.x + wire.w - this.cameraX < -220) continue;
          wire.draw(ctx, this.cameraX);
        }

        for (const bm of this.bombers) {
          if (bm.x - this.cameraX > w + 260 || bm.x + bm.w - this.cameraX < -260) continue;
          bm.draw(ctx, this.cameraX);
        }

        for (const it of this.items) {
          if (it.x - this.cameraX > w + 240 || it.x - this.cameraX < -240) continue;
          it.draw(ctx, this.cameraX, this.scale);
        }
        for (const st of this.stars) {
          if (st.x - this.cameraX > w + 240 || st.x - this.cameraX < -240) continue;
          st.draw(ctx, this.cameraX, this.scale, this.player);
        }
        for (const en of this.enemies) {
          if (en.x - this.cameraX > w + 240 || en.x - this.cameraX < -240) continue;
          en.draw(ctx, this.cameraX, this.scale);
        }
        for (const b of this.bullets) {
          if (b.x - this.cameraX > w + 260 || b.x - this.cameraX < -260) continue;
          b.draw(ctx, this.cameraX, this.scale);
        }
        for (const b of this.bombs) {
          if (b.x - this.cameraX > w + 260 || b.x - this.cameraX < -260) continue;
          b.draw(ctx, this.cameraX);
        }
        for (const fx of this.blasts) {
          const t = 1 - fx.life / fx.max;
          const sx = (fx.x - this.cameraX) | 0;
          const r = 8 + t * 24;
          ctx.fillStyle = `rgba(255,183,3,${0.55 * (1 - t)})`;
          ctx.beginPath();
          ctx.arc(sx, fx.y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        this.player.draw(ctx, this.cameraX, this.scale, this.effects.invertTimer > 0);
        if (this.state !== "menu") this.drawHUD(ctx);
        if (this.state === "playing") this.drawBomberWarning(ctx);

        if (this.state === "intro") this.drawPanel(ctx, T.introTitle, T.introLines, T.pressToContinue);
        if (this.state === "rules") this.drawPanel(ctx, T.rulesTitle, T.rulesLines, T.pressToContinue);
        if (this.state === "win") this.drawPanel(ctx, T.winTitle, T.winLines.concat([this.finalStatus || "成績會自動上載。"]), "點畫面或按 SPACE/ENTER 返回主畫面");
        if (this.state === "gameover") this.drawPanel(ctx, T.loseTitle, [this.gameOverReason || "任務失敗。", this.finalStatus || "成績會自動上載。"], "點畫面或按 SPACE/ENTER 返回主畫面");
        if (this.state === "quiz") this.drawQuiz(ctx);
      }

      drawBackground(ctx) {
        const w = this.W, far = 0.25;
        ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.fillRect(0, 250, w, 160);
        const baseY = 410;
        for (const b of this.bgBuildings) {
          const x = (b.x - this.cameraX * far) | 0;
          if (x > w + 120 || x + b.w < -120) continue;
          const y = baseY - b.h;
          const bodyCol =
            b.tone < 0.33 ? "rgba(44,45,52,0.75)" :
            b.tone < 0.66 ? "rgba(75,86,110,0.65)" :
            "rgba(122,59,46,0.55)";
          ctx.fillStyle = bodyCol; ctx.fillRect(x, y, b.w, b.h);
          ctx.fillStyle = "rgba(139,47,42,0.55)";
          if (b.roof === "flat") ctx.fillRect(x, y - 6, b.w, 6);
          else if (b.roof === "gable") {
            for (let i = 0; i < 8; i++) {
              const rw = b.w - i * 6; if (rw <= 0) break;
              ctx.fillRect(x + i * 3, y - 6 - i * 3, rw, 3);
            }
          } else { for (let i = 0; i < b.w; i += 12) ctx.fillRect(x + i, y - 12, 10, 12); }
          ctx.fillStyle = "rgba(243,199,75,0.18)";
          const rows = Math.max(2, Math.floor(b.h / 40));
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < b.windows; c++) {
              const wx = x + 10 + c * Math.floor((b.w - 20) / b.windows);
              const wy = y + 12 + r * Math.floor((b.h - 20) / rows);
              ctx.fillRect(wx, wy, 6, 8);
            }
          }
          if (b.chimney) {
            ctx.fillStyle = "rgba(27,31,46,0.55)";
            ctx.fillRect(x + b.w - 18, y - 26, 10, 20);
            ctx.fillStyle = "rgba(0,0,0,0.18)";
            ctx.fillRect(x + b.w - 20, y - 30, 14, 6);
          }
        }
      }

      drawClouds(ctx) {
        for (const c of this.bgClouds) {
          const x = (c.x - this.cameraX * 0.18) | 0;
          const y = c.y | 0;
          if (x > this.W + 120 || x < -160) continue;
          drawSprite(ctx, SPRITES.cloud, x, y, c.s);
        }
      }

      drawGoal(ctx) {
        const gateX = (this.goal.x - this.cameraX) | 0;
        const gateY = this.goal.y | 0;
        const flagX = (this.flag.x - this.cameraX) | 0;
        const flagTop = this.flag.y | 0;
        ctx.save();

        // 1) Mario 式旗杆：碰得越高，分數越多；旗幟會滑落
        const poleH = this.flag.h;
        const poleBase = flagTop + poleH;
        ctx.strokeStyle = '#f2f5f8';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(flagX + 14, flagTop);
        ctx.lineTo(flagX + 14, poleBase);
        ctx.stroke();
        ctx.fillStyle = 'rgba(229,233,240,0.70)';
        ctx.fillRect(flagX + 2, poleBase - 4, 32, 8);

        // 高分/低分提示，令學生明白 Mario 式分數機制
        ctx.font = 'bold 10px system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillStyle = 'rgba(255,209,102,0.85)';
        ctx.fillText('最高分', flagX + 26, flagTop + 13);
        ctx.fillStyle = 'rgba(232,229,216,0.62)';
        ctx.fillText('基本分', flagX + 26, poleBase - 10);

        const flagY = this.flagCaptured ? (this.flagSlideY || flagTop + poleH - 50) : flagTop + 10;
        ctx.fillStyle = '#1f5fbf';
        ctx.fillRect(flagX + 18, flagY, 22, 30);
        ctx.fillStyle = '#f4f0e3';
        ctx.fillRect(flagX + 40, flagY, 22, 30);
        ctx.fillStyle = '#c43b3b';
        ctx.fillRect(flagX + 62, flagY, 22, 30);
        ctx.strokeStyle = 'rgba(0,0,0,0.45)';
        ctx.lineWidth = 1;
        ctx.strokeRect(flagX + 18.5, flagY + 0.5, 65, 29);

        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(flagX - 10, poleBase + 8, 94, 20);
        ctx.fillStyle = '#ffd166';
        ctx.font = 'bold 13px system-ui, sans-serif';
        ctx.fillText('旗杆高度分', flagX - 1, poleBase + 23);

        if ((this.flagBonusTimer || 0) > 0 && this.flagBonusText) {
          ctx.save();
          ctx.textAlign = 'center';
          ctx.fillStyle = 'rgba(0,0,0,0.76)';
          ctx.fillRect(flagX - 8, flagTop - 38, 142, 28);
          ctx.strokeStyle = 'rgba(141,245,141,0.75)';
          ctx.strokeRect(flagX - 7.5, flagTop - 37.5, 141, 27);
          ctx.fillStyle = '#8df58d';
          ctx.font = '900 16px system-ui, sans-serif';
          ctx.fillText(this.flagBonusText, flagX + 63, flagTop - 18);
          ctx.restore();
        }

        // 2) 凡爾賽大門：通過旗杆後進入大門答終點題
        const gateW = 126;
        const gateH = 92;
        const postW = 11;
        const topY = gateY - 8;
        ctx.fillStyle = '#5b4636';
        ctx.fillRect(gateX - postW, topY + 30, postW, gateH - 16);
        ctx.fillRect(gateX + gateW, topY + 30, postW, gateH - 16);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(gateX - postW - 4, topY + gateH + 9, gateW + postW * 2 + 8, 8);

        ctx.strokeStyle = '#f3c74b';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(gateX, topY + gateH);
        ctx.lineTo(gateX, topY + 36);
        ctx.quadraticCurveTo(gateX + gateW / 2, topY - 10, gateX + gateW, topY + 36);
        ctx.lineTo(gateX + gateW, topY + gateH);
        ctx.stroke();

        ctx.strokeStyle = '#ffd166';
        ctx.lineWidth = 2;
        for (let i = 10; i <= gateW - 10; i += 14) {
          ctx.beginPath();
          ctx.moveTo(gateX + i, topY + gateH - 2);
          ctx.lineTo(gateX + i, topY + 36 + Math.abs(i - gateW / 2) * 0.25);
          ctx.stroke();
        }
        ctx.beginPath(); ctx.moveTo(gateX, topY + 58); ctx.lineTo(gateX + gateW, topY + 58); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(gateX, topY + 74); ctx.lineTo(gateX + gateW, topY + 74); ctx.stroke();

        ctx.fillStyle = 'rgba(0,0,0,0.68)';
        ctx.fillRect(gateX - 12, topY - 36, 174, 24);
        ctx.fillStyle = '#ffd166';
        ctx.font = 'bold 15px system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('凡爾賽大門 1919', gateX, topY - 18);
        ctx.restore();
      }

      drawBomberWarning(ctx) {
        if ((this.bomberWarningTimer || 0) <= 0 && (this.bombFlashTimer || 0) <= 0) return;
        ctx.save();
        if ((this.bombFlashTimer || 0) > 0) {
          ctx.fillStyle = "rgba(255,80,80,0.08)";
          ctx.fillRect(0, 0, this.W, this.H);
        }
        if ((this.bomberWarningTimer || 0) > 0) {
          const alpha = 0.55 + 0.25 * Math.sin(performance.now() / 80);
          ctx.fillStyle = `rgba(255,72,90,${alpha})`;
          ctx.fillRect(this.W / 2 - 138, 76, 276, 30);
          ctx.strokeStyle = "rgba(255,209,102,0.95)";
          ctx.lineWidth = 2;
          ctx.strokeRect(this.W / 2 - 138.5, 76.5, 276, 30);
          ctx.fillStyle = "#fff5d6";
          ctx.font = "900 17px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("⚠ 敵機接近，小心空襲", this.W / 2, 97);
        }
        ctx.restore();
      }

      drawHUD(ctx) {
        const pad = 14, panelW = 370, panelH = 56;
        ctx.fillStyle = "rgba(10,14,26,0.62)";
        ctx.fillRect(pad, pad, panelW, panelH);
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.strokeRect(pad + 0.5, pad + 0.5, panelW - 1, panelH - 1);

        const score = Math.floor(this.score);
        const time = Math.ceil(this.timeLeft);

        ctx.fillStyle = "rgba(232,229,216,0.95)";
        ctx.font = "bold 15px system-ui, sans-serif";
        ctx.fillText((this.mode === "hard" ? "困難模式" : "簡易模式") + "｜" + this.playerName, pad + 12, pad + 20);

        ctx.font = "13px system-ui, sans-serif";
        ctx.fillStyle = "rgba(232,229,216,0.90)";
        ctx.fillText(`${T.hudScore}：${score}`, pad + 12, pad + 42);
        ctx.font = "900 20px system-ui, sans-serif";
        for (let i = 0; i < 3; i++) {
          ctx.fillStyle = i < this.lives ? "rgba(255,70,90,0.98)" : "rgba(255,255,255,0.28)";
          ctx.fillText(i < this.lives ? "♥" : "♡", pad + 145 + i * 24, pad + 43);
        }
        ctx.font = "13px system-ui, sans-serif";
        ctx.fillStyle = time <= 15 ? "rgba(255,90,106,0.95)" : "rgba(243,199,75,0.95)";
        ctx.fillText(`${T.hudTime}：${time}s`, pad + 255, pad + 42);

        if (this.effects.invertTimer > 0) {
          ctx.fillStyle = "rgba(255,90,106,0.95)";
          ctx.font = "800 13px system-ui, sans-serif";
          ctx.fillText(`⚠ 左右反轉：${Math.ceil(this.effects.invertTimer)}s`, pad + 12, pad + 54);

          const sec = Math.ceil(this.effects.invertTimer);
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.35)";
          ctx.fillRect(0, 0, this.W, this.H);
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillStyle = "#ff5a6a";
          ctx.font = "900 52px system-ui, sans-serif";
          ctx.fillText("⚠ 操作反轉！", this.W / 2, this.H / 2 - 30);
          ctx.fillStyle = "#ffd166";
          ctx.font = "800 30px system-ui, sans-serif";
          ctx.fillText(`剩餘 ${sec} 秒`, this.W / 2, this.H / 2 + 30);
          ctx.restore();
        }
      }

      drawPanel(ctx, title, lines, footer) {
        const w = this.W, h = this.H;
        ctx.fillStyle = "rgba(10,14,26,0.78)"; ctx.fillRect(0, 0, w, h);
        const cw = Math.min(860, w - 60), ch = Math.min(460, h - 60);
        const cx = (w - cw) / 2, cy = (h - ch) / 2;
        ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fillRect(cx, cy, cw, ch);
        ctx.strokeStyle = "rgba(255,255,255,0.14)"; ctx.strokeRect(cx + 0.5, cy + 0.5, cw - 1, ch - 1);
        ctx.fillStyle = "rgba(232,229,216,0.96)";
        ctx.font = "800 26px system-ui, sans-serif"; ctx.fillText(title, cx + 24, cy + 52);
        ctx.font = "15px system-ui, sans-serif"; ctx.fillStyle = "rgba(232,229,216,0.92)";
        let yy = cy + 88; for (const ln of lines) { ctx.fillText(ln, cx + 24, yy); yy += 22; }
        ctx.fillStyle = "rgba(243,199,75,0.95)";
        ctx.font = "800 16px system-ui, sans-serif";
        ctx.fillText(footer, cx + 24, cy + ch - 26);
      }



      wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 3) {
        const chars = String(text || "").split("");
        let line = "";
        let lines = [];
        for (const ch of chars) {
          const test = line + ch;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = ch;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        if (lines.length > maxLines) {
          lines = lines.slice(0, maxLines);
          lines[maxLines - 1] = lines[maxLines - 1].slice(0, Math.max(0, lines[maxLines - 1].length - 1)) + "…";
        }
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, y + i * lineHeight);
        return lines.length;
      }

      getQuizBadge(item) {
        const q = String(item && item.q || "");
        if (/時序|先後|排列/.test(q)) return "排序題";
        if (/根據|資料|漫畫|演說|條文/.test(q)) return "資料判讀";
        if (/概念|定義|最能反映|最能說明/.test(q)) return "概念辨識";
        if (/是否|多大程度|判斷|支持此說/.test(q)) return "立場判斷";
        return "四選一";
      }

      drawQuiz(ctx) {
        const w = this.W, h = this.H;
        const item = this.quiz.item || this.quiz.source[this.quiz.idx];
        ctx.fillStyle = "rgba(5,8,18,0.94)"; ctx.fillRect(0, 0, w, h);
        const cw = Math.min(800, w - 120), ch = Math.min(360, h - 100);
        const cx = (w - cw) / 2, cy = (h - ch) / 2;
        ctx.fillStyle = "rgba(255,255,255,0.075)"; ctx.fillRect(cx, cy, cw, ch);
        ctx.strokeStyle = "rgba(255,255,255,0.18)"; ctx.strokeRect(cx + 0.5, cy + 0.5, cw - 1, ch - 1);

        const badge = this.getQuizBadge(item);
        ctx.fillStyle = "rgba(243,199,75,0.22)";
        ctx.fillRect(cx + 22, cy + 18, 86, 24);
        ctx.strokeStyle = "rgba(243,199,75,0.55)";
        ctx.strokeRect(cx + 22.5, cy + 18.5, 85, 23);
        ctx.fillStyle = "#ffd166";
        ctx.font = "800 13px system-ui, sans-serif";
        ctx.fillText(badge, cx + 34, cy + 35);

        ctx.fillStyle = "rgba(232,229,216,0.96)";
        ctx.font = "800 20px system-ui, sans-serif";
        ctx.fillText(this.quiz.title, cx + 122, cy + 36);

        ctx.font = "15px system-ui, sans-serif"; ctx.fillStyle = "rgba(232,229,216,0.96)";
        const qLines = this.wrapText(ctx, item.q, cx + 22, cy + 66, cw - 44, 20, 2);

        this.quiz.optionRects = [];
        const btnH = 39, gap = 8; let by = cy + 78 + qLines * 20;
        for (let i = 0; i < item.options.length; i++) {
          const bx = cx + 22, bw = cw - 44;
          const chosen = this.quiz.selected === i;
          const answered = this.quiz.selected >= 0;
          const correct = answered && i === item.answer;
          const wrongChosen = answered && chosen && i !== item.answer;
          ctx.fillStyle = correct ? "rgba(55,200,95,0.28)" : (wrongChosen ? "rgba(230,70,80,0.30)" : (chosen ? "rgba(243,199,75,0.22)" : "rgba(255,255,255,0.08)"));
          ctx.fillRect(bx, by, bw, btnH);
          ctx.strokeStyle = correct ? "rgba(65,235,105,0.72)" : (wrongChosen ? "rgba(255,95,105,0.75)" : "rgba(255,255,255,0.16)");
          ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, btnH - 1);

          ctx.fillStyle = "rgba(232,229,216,0.96)";
          ctx.font = "15px system-ui, sans-serif";
          this.wrapText(ctx, `${i + 1}) ${item.options[i]}`, bx + 14, by + 25, bw - 28, 17, 1);
          this.quiz.optionRects.push({ x: bx, y: by, w: bw, h: btnH, idx: i });
          by += btnH + gap;
        }

        ctx.fillStyle = "rgba(243,199,75,0.95)";
        ctx.font = "700 14px system-ui, sans-serif";
        ctx.fillText(T.quizHint, cx + 22, cy + ch - 46);

        if (this.quiz.feedback) {
          const ok = this.quiz.feedback.startsWith("✅");
          ctx.fillStyle = ok ? "rgba(40,150,70,0.28)" : "rgba(190,45,55,0.30)";
          ctx.fillRect(cx + 18, cy + ch - 40, cw - 36, 30);
          ctx.strokeStyle = ok ? "rgba(90,240,120,0.55)" : "rgba(255,95,105,0.60)";
          ctx.strokeRect(cx + 18.5, cy + ch - 40.5, cw - 37, 29);
          ctx.fillStyle = ok ? "rgba(190,255,200,0.98)" : "rgba(255,210,210,0.98)";
          ctx.font = "800 13px system-ui, sans-serif";
          const remain = Math.max(1, Math.ceil(this.quiz.lock || 0));
          this.wrapText(ctx, `${this.quiz.feedback}　${remain}秒後繼續`, cx + 26, cy + ch - 20, cw - 52, 16, 1);
        }
      }
    }

    const canvas = document.getElementById("game");
    if (!canvas) throw new Error('Missing <canvas id="game">');
    const game = new Game(canvas);
    window.__ww1Game = game;

    const nameInput = document.getElementById("playerNameInput");
    const nameError = document.getElementById("nameError");
    const easyBtn = document.getElementById("btnEasy");
    const hardBtn = document.getElementById("btnHard");

    function hasValidName(v) {
      return /[\p{L}\p{N}]/u.test(String(v || '').trim());
    }
    function requestStart(mode) {
      const raw = nameInput ? nameInput.value : '';
      if (!hasValidName(raw)) {
        if (nameError) nameError.textContent = "請先輸入玩家名稱，可使用中文、英文或數字。";
        if (nameInput) { nameInput.classList.add('invalid'); nameInput.focus(); }
        return;
      }
      if (nameError) nameError.textContent = "";
      if (nameInput) nameInput.classList.remove('invalid');
      game.startGame(mode, raw);
    }

    if (easyBtn) easyBtn.addEventListener("click", () => requestStart("easy"));
    if (hardBtn) hardBtn.addEventListener("click", () => requestStart("hard"));
    if (nameInput) {
      nameInput.addEventListener("input", () => {
        if (hasValidName(nameInput.value)) {
          nameInput.classList.remove('invalid');
          if (nameError) nameError.textContent = "";
        }
      });
      nameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") requestStart("easy");
      });
    }
    loadLeaderboard();
  })();
  </script>
